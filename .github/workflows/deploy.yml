name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  DEPLOY_HOST: movement.kevinferretti.com
  DEPLOY_USER: ubuntu
  DEPLOY_ROOT: /opt/movement-break
  APP_PORT: '8787'
  CLIENT_ORIGIN: https://movement.kevinferretti.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      OVH_SSH_PRIVATE_KEY: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
      OVH_SSH_KNOWN_HOSTS: ${{ secrets.OVH_SSH_KNOWN_HOSTS }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
      DEPLOY_SECRETS_CONFIGURED: ${{ secrets.OVH_SSH_PRIVATE_KEY != '' && secrets.OVH_SSH_KNOWN_HOSTS != '' && secrets.VAPID_PUBLIC_KEY != '' && secrets.VAPID_PRIVATE_KEY != '' }}

    steps:
      - name: Check required secrets
        if: env.DEPLOY_SECRETS_CONFIGURED != 'true'
        run: |
          echo "::notice::Deployment skipped because one or more required repository secrets are missing."

      - name: Checkout
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: npm ci

      - name: Verify
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          npm run lint
          npm run test
          npm run build

      - name: Prepare SSH
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$OVH_SSH_PRIVATE_KEY" > ~/.ssh/movement_break_deploy
          chmod 600 ~/.ssh/movement_break_deploy
          printf '%s\n' "$OVH_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Package release
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          release_dir="$(mktemp -d)"
          mkdir -p "$release_dir/src"
          cp package.json package-lock.json "$release_dir/"
          cp -R dist server "$release_dir/"
          cp -R src/domain "$release_dir/src/domain"
          tar -czf movement-break-${GITHUB_SHA}.tgz -C "$release_dir" .

      - name: Write production env
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          subject="${VAPID_SUBJECT:-mailto:you@example.com}"
          {
            printf 'PORT=%s\n' "$APP_PORT"
            printf 'CLIENT_ORIGIN=%s\n' "$CLIENT_ORIGIN"
            printf 'VAPID_SUBJECT=%s\n' "$subject"
            printf 'VAPID_PUBLIC_KEY=%s\n' "$VAPID_PUBLIC_KEY"
            printf 'VAPID_PRIVATE_KEY=%s\n' "$VAPID_PRIVATE_KEY"
            printf 'DATA_FILE=%s/shared/data/subscriptions.json\n' "$DEPLOY_ROOT"
          } > movement-break.env
          chmod 600 movement-break.env

      - name: Upload release
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          scp -i ~/.ssh/movement_break_deploy \
            movement-break-${GITHUB_SHA}.tgz movement-break.env \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"

      - name: Activate release
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/movement_break_deploy "$DEPLOY_USER@$DEPLOY_HOST" \
            "GITHUB_SHA='$GITHUB_SHA' DEPLOY_ROOT='$DEPLOY_ROOT' bash -s" <<'REMOTE'
          set -euo pipefail

          release="$DEPLOY_ROOT/releases/$GITHUB_SHA"
          sudo mkdir -p "$DEPLOY_ROOT/releases" "$DEPLOY_ROOT/shared/data"
          sudo chown -R "$USER:$USER" "$DEPLOY_ROOT"

          mkdir -p "$release"
          tar -xzf "/tmp/movement-break-$GITHUB_SHA.tgz" -C "$release"
          mv /tmp/movement-break.env "$DEPLOY_ROOT/shared/.env"
          chmod 600 "$DEPLOY_ROOT/shared/.env"
          ln -sfn "$DEPLOY_ROOT/shared/.env" "$release/.env"

          cd "$release"
          npm ci --omit=dev
          ln -sfn "$release" "$DEPLOY_ROOT/current"

          sudo tee /etc/systemd/system/movement-break.service > /dev/null <<'SERVICE'
          [Unit]
          Description=Movement Break PWA
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/opt/movement-break/current
          EnvironmentFile=/opt/movement-break/shared/.env
          ExecStart=/usr/bin/npm run start
          Restart=always
          RestartSec=5
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo systemctl daemon-reload
          sudo systemctl enable movement-break
          sudo systemctl restart movement-break
          curl --fail --retry 10 --retry-delay 2 "http://127.0.0.1:8787/api/health"

          find "$DEPLOY_ROOT/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
          REMOTE
