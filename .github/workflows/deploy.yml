name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  DEPLOY_HOST: movement.kevinferretti.com
  DEPLOY_USER: codex
  DEPLOY_ROOT: /opt/movement-break
  APP_PORT: '8787'
  CLIENT_ORIGIN: https://movement.kevinferretti.com
  PUBLIC_URL: https://movement.kevinferretti.com
  DATA_FILE: /opt/movement-break/shared/data.json

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      OVH_SSH_PRIVATE_KEY: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
      OVH_SSH_KNOWN_HOSTS: ${{ secrets.OVH_SSH_KNOWN_HOSTS }}
      OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
      OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
      OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
      DEPLOY_SECRETS_CONFIGURED: ${{ secrets.OVH_SSH_PRIVATE_KEY != '' && secrets.OVH_SSH_KNOWN_HOSTS != '' }}

    steps:
      - name: Check required secrets
        if: env.DEPLOY_SECRETS_CONFIGURED != 'true'
        run: |
          echo "::notice::Deployment skipped because one or more required repository secrets are missing."

      - name: Checkout
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: npm ci

      - name: Verify
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          npm run lint
          npm run test
          npm run build

      - name: Prepare SSH
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$OVH_SSH_PRIVATE_KEY" > ~/.ssh/movement_break_deploy
          chmod 600 ~/.ssh/movement_break_deploy
          printf '%s\n' "$OVH_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Package release
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/movement-break-${GITHUB_SHA}.tgz"
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.data' \
            --exclude='.deploy' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.tgz' \
            -czf "$archive" .
          cp "$archive" movement-break-${GITHUB_SHA}.tgz

      - name: Write production env
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          {
            printf 'PORT=%s\n' "$APP_PORT"
            printf 'CLIENT_ORIGIN=%s\n' "$CLIENT_ORIGIN"
            printf 'PUBLIC_URL=%s\n' "$PUBLIC_URL"
            printf 'DATA_FILE=%s\n' "$DATA_FILE"
            printf 'GITHUB_CLIENT_ID=%s\n' "$OAUTH_GITHUB_CLIENT_ID"
            printf 'GITHUB_CLIENT_SECRET=%s\n' "$OAUTH_GITHUB_CLIENT_SECRET"
            printf 'GOOGLE_CLIENT_ID=%s\n' "$OAUTH_GOOGLE_CLIENT_ID"
            printf 'GOOGLE_CLIENT_SECRET=%s\n' "$OAUTH_GOOGLE_CLIENT_SECRET"
          } > movement-break.env
          chmod 600 movement-break.env

      - name: Upload release
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          scp -i ~/.ssh/movement_break_deploy \
            movement-break-${GITHUB_SHA}.tgz movement-break.env \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"

      - name: Activate release
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/movement_break_deploy "$DEPLOY_USER@$DEPLOY_HOST" \
            "GITHUB_SHA='$GITHUB_SHA' DEPLOY_ROOT='$DEPLOY_ROOT' APP_PORT='$APP_PORT' bash -s" <<'REMOTE'
          set -euo pipefail

          release="$DEPLOY_ROOT/releases/$GITHUB_SHA"
          sudo mkdir -p "$DEPLOY_ROOT/releases" "$DEPLOY_ROOT/shared"
          sudo chown -R "$USER:$USER" "$DEPLOY_ROOT"

          mkdir -p "$release"
          tar -xzf "/tmp/movement-break-$GITHUB_SHA.tgz" -C "$release"
          mv /tmp/movement-break.env "$DEPLOY_ROOT/shared/.env"
          chmod 600 "$DEPLOY_ROOT/shared/.env"
          ln -sfn "$DEPLOY_ROOT/shared/.env" "$release/.env"

          ln -sfn "$release" "$DEPLOY_ROOT/current"

          docker network create edge-proxy >/dev/null 2>&1 || true

          cd "$release"
          docker compose -p movement-break -f deploy/ovh/docker-compose.yml up -d --build --remove-orphans
          for attempt in $(seq 1 20); do
            if docker compose -p movement-break -f deploy/ovh/docker-compose.yml exec -T app \
              node -e "fetch('http://127.0.0.1:$APP_PORT/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              break
            fi

            if [ "$attempt" -eq 20 ]; then
              echo "Movement Break container did not become healthy." >&2
              docker compose -p movement-break -f deploy/ovh/docker-compose.yml logs --tail=100 app >&2
              exit 1
            fi

            sleep 2
          done

          current_release="$(readlink -f "$DEPLOY_ROOT/current")"
          find "$DEPLOY_ROOT/releases" -mindepth 1 -maxdepth 1 -type d ! -samefile "$current_release" -printf '%T@ %p\n' \
            | sort -n \
            | head -n -4 \
            | cut -d' ' -f2- \
            | xargs -r rm -rf
          REMOTE

      - name: Verify public endpoint
        if: env.DEPLOY_SECRETS_CONFIGURED == 'true'
        run: |
          set -euo pipefail
          curl --fail --retry 10 --retry-delay 3 --retry-all-errors "$PUBLIC_URL/api/health"
